services:
  api:
    image: ghcr.io/slowlydev/f1-dash-api:latest
    build:
      context: .
      dockerfile: dockerfile
      target: api
    # Exposes:
    #   GET /api/schedule            — current/upcoming sessions
    #   GET /api/archive[?year=YYYY] — past meetings/sessions from F1 CDN
    #   GET /api/archive/session?path=... — feeds available for a session
    ports:
      - 4010:80
    environment:
      - RUST_LOG=api=debug
      - ADDRESS=0.0.0.0:80
      - ORIGIN=http://localhost:3000

  realtime:
    image: ghcr.io/slowlydev/f1-dash-realtime:latest
    build:
      context: .
      dockerfile: dockerfile
      target: realtime
    # Exposes:
    #   GET  /api/realtime          — SSE stream (initial/update/reset events)
    #   POST /api/replay/start      — body { path, speed } switch to archive replay
    #   POST /api/replay/stop       — switch back to live
    #   GET  /api/replay/status     — { mode, path?, positionMs?, totalMs?, speed? }
    ports:
      - 4000:80
    environment:
      - RUST_LOG=realtime=debug
      - ADDRESS=0.0.0.0:80
      - ORIGIN=http://localhost:3000

  web:
    image: ghcr.io/slowlydev/f1-dash:latest
    build:
      context: ./dashboard
      dockerfile: dockerfile
    depends_on:
      - realtime
      - api
    ports:
      - 3000:3000
    environment:
      - NEXT_PUBLIC_LIVE_URL=http://localhost:4000
      - API_URL=http://api:80
